{% comment %}Usage: {% include "emails/_button.html" with url=some_url label="Click me" %}{% endcomment %}
<table role="presentation" cellpadding="0" cellspacing="0" style="margin:28px 0 4px 0;">
  <tr>
    <td style="background-color:#17150F;">
      <a href="{{ url }}"
         style="display:inline-block;padding:13px 28px;font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
                font-size:14px;font-weight:600;color:#FFFFFF;text-decoration:none;letter-spacing:0.3px;">
        {{ label }}
      </a>
    </td>
  </tr>
</table>
<p style="margin:12px 0 0 0;font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
          font-size:12px;color:#8A8371;word-break:break-all;">
  Or paste this link into your browser:<br>
  <a href="{{ url }}" style="color:#8A7F5E;">{{ url }}</a>
</p>
