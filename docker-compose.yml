# Local development stack (SDD §9 — Docker Compose)
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: kna_archive
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports: ["5432:5432"]
    volumes: [pgdata:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports: ["5672:5672", "15672:15672"]  # 15672 = management UI (guest/guest)
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      retries: 5

  redis:
    image: redis:7-alpine
    # No host port: backend/worker reach it on the compose network as
    # redis://redis:6379. (A brew redis on the host owns 6379 anyway.)
    volumes: [redisdata:/data]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5

  backend:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    env_file: .env
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/kna_archive
      DJANGO_SETTINGS_MODULE: config.settings.development
      CELERY_BROKER_URL: amqp://guest:guest@rabbitmq:5672//
      CELERY_TASK_ALWAYS_EAGER: "False"  # worker service handles tasks
      REDIS_URL: redis://redis:6379/1
    volumes: [".:/app"]
    ports: ["8000:8000"]
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build: .
    command: celery -A config worker -l info --concurrency 2
    env_file: .env
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/kna_archive
      DJANGO_SETTINGS_MODULE: config.settings.development
      CELERY_BROKER_URL: amqp://guest:guest@rabbitmq:5672//
      CELERY_TASK_ALWAYS_EAGER: "False"
      REDIS_URL: redis://redis:6379/1
    volumes: [".:/app"]
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

volumes:
  pgdata:
  redisdata:
