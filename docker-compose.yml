# Local development stack (SDD §9 — Docker Compose)
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: kna_archive
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports: ["5432:5432"]
    volumes: [pgdata:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      retries: 5

  backend:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    env_file: .env
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/kna_archive
      DJANGO_SETTINGS_MODULE: config.settings.development
    volumes: [".:/app"]
    ports: ["8000:8000"]
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
