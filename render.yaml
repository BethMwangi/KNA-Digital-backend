services:
  - type: web
    name: kna-digital-backend
    env: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn config.wsgi:application --bind 0.0.0.0:$PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.0
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: PYTHONUNBUFFERED
        value: "1" # without this, log output can be delayed/lost in a container
      - key: LOG_LEVEL
        value: INFO
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        sync: false # You will provide this in the Render dashboard (e.g. your Supabase URL)
      - key: ALLOWED_HOSTS
        value: "*" # Or restrict to your specific Render domain
      - key: CORS_ALLOWED_ORIGINS
        sync: false # Set this in the dashboard to your frontend URL
      - key: FRONTEND_URL
        value: "https://kna-digital-archive-frontend.vercel.app" # STABLE domain only — never
        # a Vercel preview URL (the ones with a random hash suffix, e.g. "-gmqkgw28z"):
        # those expire/redirect once superseded, silently breaking every emailed
        # verify-email/reset-password link generated while they're configured.
